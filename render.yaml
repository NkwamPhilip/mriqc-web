services:
  - type: web
    name: webmriqc-api
    runtime: python
    buildCommand: bash setup_render.sh
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    # Free tier spins down after 15 min idle — fine for testing
    # Upgrade to "starter" ($7/mo) to keep it alive 24/7
