version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# WebMRIQC — self-contained deployment
#
# Quick start:
#   docker compose up -d --build
#
# Then open  http://<server-ip>:8000  in your browser.
#
# Configuration via environment variables (create a .env file or export them):
#
#   PORT             Host port the site is reachable on  (default: 8050)
#   WORKERS          Uvicorn worker processes            (default: 16)
#                    Set to roughly 2× the number of concurrent users you
#                    expect.  MRIQC jobs run in background threads, so
#                    workers only need to handle HTTP — 16 is plenty for a
#                    continental-scale deployment on the scalar server.
#
#   GEMINI_API_KEY   Free AI chatbot key from https://aistudio.google.com/app/apikey
#
#   SUPPORT_EMAIL    Lab inbox that receives support tickets
#   SMTP_HOST        SMTP server  (default: smtp.gmail.com)
#   SMTP_PORT        SMTP port    (default: 587)
#   SMTP_USER        Gmail address used to send ticket emails
#   SMTP_PASSWORD    Gmail App Password (NOT your Gmail login password)
#                    Generate at: https://myaccount.google.com/apppasswords
#
# Create a .env file next to this file (it is gitignored):
#   PORT=8050
#   WORKERS=16
#   MAX_CONCURRENT_JOBS=16
#   GEMINI_API_KEY=AIzaSy...
#   SUPPORT_EMAIL=info@mailab.io
#   SMTP_USER=you@gmail.com
#   SMTP_PASSWORD=xxxx xxxx xxxx xxxx
# ─────────────────────────────────────────────────────────────────────────────

services:
  webmriqc:
    build:
      context: .
      dockerfile: Dockerfile
    image: webmriqc:latest
    container_name: webmriqc
    restart: unless-stopped

    ports:
      - "${PORT:-8050}:8000"

    environment:
      # ── Web server ────────────────────────────────────────────────────────
      - WORKERS=${WORKERS:-16}
      # ── Job queue (tuned for 384-CPU / 1.5 TB scalar server) ─────────────
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-16}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      # ── AI chatbot (Google Gemini free tier) ──────────────────────────────
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # ── Support ticket email ──────────────────────────────────────────────
      - SUPPORT_EMAIL=${SUPPORT_EMAIL:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}

    # Mount the host's /tmp/webmriqc so large DICOM/BIDS work dirs live on the
    # host filesystem instead of the container's overlay layer. This avoids
    # Docker's overlay storage growing huge and is faster on most Linux systems.
    volumes:
      - /tmp/webmriqc:/tmp/webmriqc
      - /tmp/webmriqc_jobs:/tmp/webmriqc_jobs

    # Shared memory for FSL/ANTs parallel steps.
    # 16 concurrent jobs × ~1 GB shm each → 16 GB minimum; 64 GB is generous.
    shm_size: "64gb"

    # Soft resource hint to Docker's scheduler.
    # With 16 jobs × 64 GB each the container needs up to ~1 TB.
    # Does NOT hard-limit — the kernel can use more if available.
    mem_reservation: "1000g"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s   # give time for first-run Docker pulls inside mriqc
      retries: 5

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL: uncomment the nginx service below to put a proper reverse proxy in
# front (useful for HTTPS / SSL, large-file buffering, or running on port 80/443).
# You also need to provide ssl/cert.pem and ssl/key.pem on the host.
#
# See DEPLOY.md → "Adding HTTPS" for a step-by-step guide.
# ─────────────────────────────────────────────────────────────────────────────
