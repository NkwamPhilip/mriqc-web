# ─────────────────────────────────────────────────────────────────────────────
# WebMRIQC — nginx reverse proxy config
#
# Used only if you uncomment the `nginx` service in docker-compose.yml.
# Place your SSL certs at:  ./ssl/cert.pem  and  ./ssl/key.pem
# (see DEPLOY.md → "Adding HTTPS" for how to generate them)
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow large DICOM/BIDS uploads (DICOMs can easily exceed 1 GB)
    client_max_body_size 4096m;

    # Increase proxy timeouts for long MRIQC runs (up to 2 hours)
    proxy_read_timeout    7200;
    proxy_connect_timeout 30;
    proxy_send_timeout    7200;

    # Buffer large uploads to disk so the backend isn't blocked waiting for
    # a slow client to finish uploading
    proxy_request_buffering off;

    location / {
        proxy_pass         http://webmriqc:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
